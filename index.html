<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srisuvit Smart Maintenance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Srisuvit <span>Maintenance</span></h1>
        </div>
        <nav>
            <button onclick="switchView('home-view')">หน้าแรก</button>
            <button onclick="switchView('admin-view')" class="btn-outline">ฝ่าย IT (Admin)</button>
        </nav>
    </header>

    <main id="main-content">
        <section id="home-view" class="view active">
            <div class="hero">
                <h2>ระบบแจ้งซ่อมออนไลน์</h2>
                <p>แจ้งปัญหาอุปกรณ์ชำรุด อาคารสถานที่ ได้อย่างรวดเร็ว</p>
                <div class="status-box">คิวงานรอซ่อม: <span id="queue-count">0</span> คิว</div>
                <button class="btn-primary btn-large" onclick="switchView('report-view')">
                    <i class="fas fa-wrench"></i> แจ้งซ่อมทันที
                </button>
            </div>
        </section>
        
        <div class="home-queue-container">
            <h3 style="margin-top: 30px; color: var(--navy);">รายการที่รอดำเนินการ</h3>
            <div class="table-responsive">
                <table class="minimal-table">
                    <thead>
                        <tr>
                            <th>วัน/เวลา</th>
                            <th>ผู้แจ้ง</th>
                            <th>สถานที่</th>
                            <th>อาการ</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="home-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
        <section id="report-view" class="view">
            <h2>ฟอร์มแจ้งซ่อม</h2>
            <form id="report-form">
                <div class="form-group">
                    <label>ชื่อผู้แจ้ง:</label>
                    <input type="text" id="reporter-name" required placeholder="เช่น ครู...">
                </div>
                <div class="form-group location-row" style="display: flex; gap: 10px;">
    <div style="flex: 2;">
        <label>อาคาร:</label>
        <input type="text" id="building" required placeholder="อาคาร">
    </div>
    <div style="flex: 1;">
        <label>ชั้น:</label>
        <input type="text" id="floor" required placeholder="ชั้น">
    </div>
    <div style="flex: 1;">
        <label>ห้อง:</label>
        <input type="text" id="room" required placeholder="ห้อง">
    </div>
</div>

<section id="admin-view" class="view">
    <h2>จัดการรายการแจ้งซ่อม (ฝ่าย IT)</h2>
    <div class="table-responsive">
        <table id="admin-table">
            <thead>
                <tr>
                    <th>เวลาแจ้ง</th>
                    <th>ผู้แจ้ง</th>
                    <th>สถานที่</th>
                    <th>อาการ</th>
                    <th>รูปภาพ</th>
                    <th>ผู้รับผิดชอบ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th> </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
